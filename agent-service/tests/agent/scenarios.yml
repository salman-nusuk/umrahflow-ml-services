# Scenario inventory. Run subsets via --tag or --scenario.
# Fixture paths under `media:` are relative to tests/agent/fixtures/ — drop
# files there or symlink your AGOG/, BAAB E KABA/ folders. See fixtures/README.md.

# ============================================================ BURST ROUTING

- id: single-voucher-happy-path
  tags: [burst-routing, happy-path]
  description: One voucher + matching passports in a single burst.
  inputs:
    - text: ""
      media:
        - "agent_A/voucher.pdf"
        - "agent_A/p1_FY1755541_mahboob.jpg"
        - "agent_A/p2_JT3963061_sakina.jpg"
        - "agent_A/p3_BP0138231_rumaisa.jpg"
        - "agent_A/p4_QQ4912891_shahnaz.jpg"
        - "agent_A/p5_TK5163901_mehnaz.jpg"
  expect:
    db:
      passports_count: 5
      passports_flagged: 0
      passports_drafts: 0
    reply:
      count: 1
      language: english
      must_not_contain: ["—", "ho gaye", "ke against", "saved 5 of 5", "flagged for review"]
      tone_judge: "Pakistani B2B WhatsApp tone (terse-but-polite is fine, doesn't need warmth/pleasantries), English, no em-dashes (—), no emojis, mentions one UB number (UB-NNNNNN format with hyphen is fine). Confirms passports were saved."
    trace:
      tool_calls_max: 30
      send_whatsapp_count: 1
    latency_ms_max: 90000

- id: multi-voucher-burst-routing
  tags: [burst-routing]
  description: 2 vouchers + 10 passports; each passport routes to its UB.
  inputs:
    - text: ""
      media:
        - "agent_A/voucher.pdf"
        - "agent_B/voucher.pdf"
        - "agent_A/p1_FY1755541_mahboob.jpg"
        - "agent_A/p2_JT3963061_sakina.jpg"
        - "agent_A/p3_BP0138231_rumaisa.jpg"
        - "agent_A/p4_QQ4912891_shahnaz.jpg"
        - "agent_A/p5_TK5163901_mehnaz.jpg"
        - "agent_B/p1_AK5099013_anwar.jpg"
        - "agent_B/p2_SQ8458391_dua.jpg"
        - "agent_B/p3_BL5931731_ayesha.jpg"
        - "agent_B/p4_EM6311161_rimsha.jpg"
        - "agent_B/p5_QW3959892_naseem.jpg"
  expect:
    db:
      passports_count: 10
    reply:
      count: 1
      language: english
      tone_judge: "mentions BOTH UB numbers, English, no em-dashes (—), no Roman Urdu (UB-NNNNNN format with hyphen is fine)"
    trace:
      send_whatsapp_count: 1
      tool_calls_max: 60
    latency_ms_max: 120000

- id: voucher-then-passports-30s-later
  tags: [burst-routing, split]
  description: Voucher first, then passports after 30s; scan_drafts attaches.
  inputs:
    - text: ""
      media: ["agent_A/voucher.pdf"]
    - delay_ms: 30000
    - text: ""
      media:
        - "agent_A/p1_FY1755541_mahboob.jpg"
        - "agent_A/p2_JT3963061_sakina.jpg"
        - "agent_A/p3_BP0138231_rumaisa.jpg"
  expect:
    db:
      passports_count: 3
    reply:
      count: 2
      language: english
    trace:
      send_whatsapp_count: 1   # last turn

- id: passports-only-no-voucher
