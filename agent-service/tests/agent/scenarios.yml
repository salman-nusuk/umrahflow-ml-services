- id: multi-voucher-passport-on-both
  tags: [burst-routing, escalation]
  description: A passport listed on TWO open vouchers → multi_match + requires_l1.
  inputs:
    - text: ""
      media:
        - "agent_A/voucher.pdf"
        - "agent_B/voucher.pdf"
        - "shared/shared_passport.jpg"
  expect:
    trace:
      requires_l1_count: 1
    reply:
      count: 1
      tone_judge: "asks which booking the passport is for, neutral, English"

- id: cross-agent-passport
  tags: [cross-agent, escalation]
  description: Agent B submits a passport already on Agent A's voucher.
  sub_agent: __test_agent_B__
  setup:
    sql: |
      -- Agent A voucher pre-seeded with passport AB1234567
      INSERT INTO "SubAgent" (id, name, "contactName", phone, city, status, "createdAt")
        VALUES ('tsa_xagent_A', 'xagent_A', 'Test', '+92xagentA', 'Karachi', 'ACTIVE', NOW())
        ON CONFLICT (id) DO NOTHING;
      INSERT INTO "Voucher" (id, uid, "ubNumber", "subAgentId", status, pool, "createdAt", "updatedAt")
        VALUES ('tv_xagent_A', 'uid_tv_xagent_A', 'UB-T999001', 'tsa_xagent_A', 'PENDING_REVIEW', 'UB', NOW(), NOW())
        ON CONFLICT (id) DO NOTHING;
      INSERT INTO "Passport"
        (id, "passportNumber", "voucherId", "screeningStatus", "createdAt", "updatedAt")
        VALUES ('tp_xagent_A_AB1234567', 'AB1234567', 'tv_xagent_A', 'CLEAN', NOW(), NOW())
        ON CONFLICT (id) DO NOTHING;
    cleanup_sql: |
      DELETE FROM "Passport" WHERE id='tp_xagent_A_AB1234567';
      DELETE FROM "Voucher" WHERE id='tv_xagent_A';
      DELETE FROM "SubAgent" WHERE id='tsa_xagent_A';
  inputs:
    - text: ""
      media: ["cross-agent/AB1234567.jpg"]
  expect:
    trace:
      requires_l1_count: 1

- id: cross-agent-voucher-hijack
  tags: [cross-agent, escalation]
  description: Agent B re-upserts a UB owned by Agent A. A's ownership preserved.
  sub_agent: __test_agent_B__
  setup:
    sql: |
      INSERT INTO "SubAgent" (id, name, "contactName", phone, city, status, "createdAt")
        VALUES ('tsa_xagent_A', 'xagent_A', 'Test', '+92xagentA', 'Karachi', 'ACTIVE', NOW())
        ON CONFLICT (id) DO NOTHING;
      INSERT INTO "Voucher" (id, uid, "ubNumber", "subAgentId", status, pool, "createdAt", "updatedAt")
        VALUES ('tv_hijack', 'uid_tv_hijack', 'UB-T999002', 'tsa_xagent_A', 'PENDING_REVIEW', 'UB', NOW(), NOW())
        ON CONFLICT (id) DO NOTHING;
    cleanup_sql: |
      DELETE FROM "Voucher" WHERE id='tv_hijack';
      DELETE FROM "SubAgent" WHERE id='tsa_xagent_A';
  inputs:
    - text: ""
      media: ["cross-agent/UB-T999002-voucher.pdf"]
  expect:
    db:
      vouchers_owned_by_other_agent: 1
    trace:
      requires_l1_count: 1

- id: blacklisted-passport
  tags: [escalation]
  description: A passport on the blacklist → screening_status=FLAGGED, requires_l1.
  setup:
    sql: |
      INSERT INTO "Blacklist" ("id", "passportNumber", reason, "addedBy", "createdAt")
      VALUES ('tbl_AB1234567', 'AB1234567', 'test', 'system', NOW())
      ON CONFLICT ("passportNumber") DO NOTHING;
    cleanup_sql: |
      DELETE FROM "Blacklist" WHERE "passportNumber"='AB1234567';
  inputs:
    - text: ""
      media:
        - "agent_A/voucher.pdf"
        - "blacklist/AB1234567.jpg"
  expect:
    db:
      passports_flagged: 1
    trace:
      requires_l1_count: 1

